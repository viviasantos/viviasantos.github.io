<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agile Practices - Viviane Santos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f3f1ed;--surface:#fbfaf7;--border:#d9d5ce;--border2:#bfb8ae;--text:#111;--muted:#5f5a53;--accent:#111;--green:#67d98f}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent 28%),radial-gradient(circle at top right, rgba(0,0,0,0.03), transparent 24%),var(--bg);color:var(--text);font-size:15px;line-height:1.7;min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(16px);border-bottom:1px solid #00000014;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.05em;color:#fff}
.nav-links{display:flex;gap:2rem;flex-wrap:wrap}
.nav-links a{color:#d9d9d9;text-decoration:none;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:#fff}
.wrap{max-width:1180px;margin:0 auto;padding:84px 2rem 88px}
.hero-head{max-width:820px;margin-bottom:2rem}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,5vw,62px);font-weight:700;line-height:1;letter-spacing:-0.02em;margin-bottom:0.75rem}
.project-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.85rem}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1rem 0.9rem;text-decoration:none;display:flex;flex-direction:column;gap:0.5rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;min-height:110px}
.project-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);transform:scaleY(0);transform-origin:bottom;transition:transform .3s}
.project-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.project-card:hover::after{transform:scaleY(1)}
.project-card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.3;transition:color .2s}
.project-card:hover .project-card-title{color:var(--accent)}
.project-card-stack{display:flex;flex-wrap:wrap;gap:5px;margin-top:0.25rem}
.tag{background:rgba(103,217,143,0.12);border:1px solid rgba(103,217,143,0.32);padding:3px 10px;border-radius:2px;font-size:12px;color:#2f8b57;font-family:'DM Mono',monospace}
.project-card-arrow{align-self:flex-end;color:var(--muted);transition:color .2s,transform .2s}
.project-card-arrow svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.project-card:hover .project-card-arrow{color:var(--accent);transform:translateX(3px)}
.cta-row{display:flex;justify-content:flex-start;margin-top:1.25rem}
.btn{padding:10px 24px;border-radius:2px;font-size:13px;letter-spacing:0.06em;text-decoration:none;border:1px solid var(--border2);font-family:'Outfit',sans-serif;transition:all .2s;background:transparent;color:var(--text)}
.btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.footer-note{margin-top:3rem;border-top:1px solid var(--border);padding:2rem 0 0;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:center}
@media(max-width:980px){.project-cards{grid-template-columns:1fr}}
@media(max-width:768px){nav{padding:0 1rem}.wrap{padding:48px 1rem 72px}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">VS.</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="project.html">Projects</a>
    <a href="notes.html">Blog</a>
    <a href="links.html">Links</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="wrap">
  <div class="hero-head">
    <h1 class="hero-title">Agile Practices</h1>
  </div>

  <div class="project-cards">
    <a href="note-user-stories.html" class="project-card">
      <div class="project-card-title">Creating User Stories</div>
      <div class="project-card-stack">
        <span class="tag">Agile</span><span class="tag">User Stories</span>
      </div>
      <div class="project-card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
    <a href="note-scrum-implementation.html" class="project-card">
      <div class="project-card-title">Implementation of Scrum</div>
      <div class="project-card-stack">
        <span class="tag">Scrum</span><span class="tag">Delivery</span>
      </div>
      <div class="project-card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
    <a href="note-scrum-ceremonies.html" class="project-card">
      <div class="project-card-title">Example to Structure Scrum Ceremonies</div>
      <div class="project-card-stack">
        <span class="tag">Agile</span><span class="tag">Ceremonies</span>
      </div>
      <div class="project-card-arrow"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
  </div>

  <div class="cta-row">
    <a href="project.html" class="btn">Back to Projects</a>
  </div>

  <div class="footer-note">2026 Viviane Santos - Business Analyst</div>
</div>
</body>
</html>
