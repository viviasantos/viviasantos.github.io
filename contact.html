<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Viviane Santos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f3f1ed;
  --surface:#fbfaf7;
  --surface2:#f2efe9;
  --border:#d9d5ce;
  --border2:#bfb8ae;
  --text:#111111;
  --muted:#5f5a53;
  --accent:#111111;
  --green:#67d98f;
}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent 28%),
    radial-gradient(circle at top right, rgba(0,0,0,0.03), transparent 24%),
    var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.7;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid #00000014;
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.nav-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;
  letter-spacing:0.05em;
  color:#ffffff;
}
.nav-links{display:flex;gap:2rem;flex-wrap:wrap}
.nav-links a{
  color:#d9d9d9;
  text-decoration:none;
  font-size:13px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:color .2s;
}
.nav-links a:hover{color:#ffffff}
.wrap{max-width:1040px;margin:0 auto;padding:84px 2rem}
.footer-shell{
  border:1px solid var(--border);
  background:linear-gradient(180deg,#fbfaf7 0%,#f4f1ea 100%);
  border-radius:18px;
  padding:2rem;
  box-shadow:0 18px 50px rgba(0,0,0,0.08);
}
.section-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.section-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.1em}
.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,5vw,62px);
  font-weight:400;
  line-height:1;
  letter-spacing:-0.02em;
}
.intro{
  max-width:760px;
  color:var(--muted);
  margin-bottom:2rem;
  line-height:1.85;
}
.contact-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1rem;
}
.contact-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.2rem;
  min-height:132px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:border-color .2s,transform .2s;
}
.contact-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.contact-label{
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--green);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-bottom:0.75rem;
}
.contact-value{
  font-size:15px;
  color:var(--text);
  line-height:1.6;
  word-break:break-word;
}
.contact-action{
  margin-top:1rem;
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--green);
}
.contact-action svg{
  width:12px;height:12px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
}
.footer-note{
  margin-top:2rem;
  padding-top:1rem;
  border-top:1px solid var(--border);
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
@media(max-width:768px){
  nav{padding:0 1rem}
  .wrap{padding:48px 1rem 72px}
  .contact-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">VS.</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="project.html">Projects</a>
    <a href="notes.html">Blog</a>
    <a href="links.html">Links</a>
  </div>
</nav>

<div class="wrap">
  <div class="footer-shell">
    <div class="section-header">
      <h1 class="section-title">Contact</h1>
    </div>

    <div class="contact-grid">
      <a class="contact-card" href="https://mail.google.com/mail/?view=cm&fs=1&to=viviassantos.it@gmail.com" target="_blank" rel="noopener">
        <div>
          <div class="contact-label">Email</div>
          <div class="contact-value">viviassantos.it@gmail.com</div>
        </div>
        <div class="contact-action">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </a>
      <a class="contact-card" href="https://www.linkedin.com/in/visants/" target="_blank" rel="noopener">
        <div>
          <div class="contact-label">LinkedIn</div>
          <div class="contact-value">linkedin.com/in/visants</div>
        </div>
        <div class="contact-action">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </a>
      <a class="contact-card" href="https://github.com/viviasantos" target="_blank" rel="noopener">
        <div>
          <div class="contact-label">GitHub</div>
          <div class="contact-value">github.com/viviasantos</div>
        </div>
        <div class="contact-action">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </a>
    </div>

  </div>
</div>
<div class="footer-note">2026 Viviane Santos - Business Analyst</div>
</body>
</html>
