<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example to Structure Scrum Ceremonies - Viviane Santos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0e9;--surface:#fbfaf7;--border:#d9d2c8;--border2:#c9c1b6;--text:#111111;--muted:#5f5a53;--green:#67d98f}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:radial-gradient(circle at top left,rgba(0,0,0,0.05),transparent 28%),radial-gradient(circle at top right,rgba(0,0,0,0.03),transparent 24%),var(--bg);color:var(--text);font-size:15px;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(16px);border-bottom:1px solid #00000014;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.05em;color:#ffffff}
.nav-back{display:inline-flex;align-items:center;gap:6px;color:#d9d9d9;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;transition:color .2s}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s}
.nav-back:hover{color:#ffffff}
.nav-back:hover svg{transform:translateX(-3px)}
.wrap{max-width:900px;margin:0 auto;padding:72px 2rem 88px;flex:1 0 auto}
.hero{padding-bottom:2rem;border-bottom:1px solid var(--border)}
.project-meta{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.project-tag{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#2f8b57;background:rgba(103,217,143,0.12);border:1px solid rgba(103,217,143,0.32);padding:3px 9px;border-radius:2px;display:inline-flex}
.project-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.dot{width:3px;height:3px;border-radius:50%;background:var(--border2)}
.project-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,5vw,62px);font-weight:700;line-height:1.04;letter-spacing:-0.02em;margin:1rem 0 0.9rem}
.coming-soon{margin-top:1.5rem;background:linear-gradient(135deg, rgba(255,255,255,0.55), rgba(242,239,233,0.9));border:1px dashed var(--border2);border-radius:2px;padding:1.25rem 1.35rem}
.coming-soon-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#2f8b57;margin-bottom:0.55rem}
.coming-soon h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;line-height:1.1;margin-bottom:0.55rem}
.coming-soon p{color:var(--muted);font-size:14px;line-height:1.8;max-width:720px}
.cta-row{display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:4px;font-size:13px;letter-spacing:0.06em;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--green);color:#2f8b57}
.footer-note{margin-top:auto;text-align:center;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;padding:1.5rem 1rem 2rem;border-top:1px solid var(--border)}
@media(max-width:768px){nav{padding:0 1rem}.wrap{padding:48px 1rem 72px}.cta-row{justify-content:stretch}.btn{width:100%;justify-content:center}}
</style>
</head>
<body>
<nav>
  <a href="project.html" class="nav-logo">VS.</a>
  <a href="agile-practices.html" class="nav-back">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Projects
  </a>
</nav>
<div class="wrap">
  <section class="hero">
    <div class="project-meta">
      <span class="project-tag">Presentation</span>
      <span class="dot"></span>
      <span class="project-date">Agile</span>
      <span class="dot"></span>
      <span class="project-date">Scrum · Ceremonies</span>
    </div>
    <h1 class="project-title">Example to Structure Scrum Ceremonies</h1>
    <div class="coming-soon">
      <div class="coming-soon-label">Em breve</div>
      <h2>More examples will appear here soon.</h2>
    </div>
  </section>

  <div class="cta-row">
    <a href="agile-practices.html" class="btn btn-outline">Back to Projects</a>
  </div>

  <div class="footer-note">2026 Viviane Santos - Business Analyst</div>
</div>
</body>
</html>
