<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Analysis - Viviane Santos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f3f1ed;--surface:#fbfaf7;--border:#d9d5ce;--border2:#bfb8ae;--text:#111;--muted:#5f5a53;--accent:#111;--green:#67d98f}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:radial-gradient(circle at top left, rgba(0,0,0,0.05), transparent 28%),radial-gradient(circle at top right, rgba(0,0,0,0.03), transparent 24%),var(--bg);color:var(--text);font-size:15px;line-height:1.7;min-height:100vh}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(16px);border-bottom:1px solid #00000014;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.05em;color:#fff}
.nav-links{display:flex;gap:2rem;flex-wrap:wrap}
.nav-links a{color:#d9d9d9;text-decoration:none;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:#fff}
.nav-back{display:none}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s}
.nav-back:hover{color:#ffffff}
.nav-back:hover svg{transform:translateX(-3px)}
.wrap{max-width:1180px;margin:0 auto;padding:84px 2rem 88px}
.hero-head{max-width:820px;margin-bottom:2rem}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,5vw,62px);font-weight:700;line-height:1;letter-spacing:-0.02em;margin-bottom:0.75rem}
.coming-soon{margin-top:1.5rem;background:linear-gradient(135deg, rgba(255,255,255,0.55), rgba(242,239,233,0.9));border:1px dashed var(--border2);border-radius:2px;padding:1.25rem 1.35rem}
.coming-soon-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#2f8b57;margin-bottom:0.55rem}
.coming-soon h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;line-height:1.1;margin-bottom:0.55rem}
.coming-soon p{color:var(--muted);font-size:14px;line-height:1.8;max-width:720px}
.cta-row{display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:2px;font-size:13px;letter-spacing:0.06em;text-decoration:none;border:1px solid var(--border2);font-family:'Outfit',sans-serif;transition:all .2s;background:transparent;color:var(--text)}
.btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.footer-note{margin-top:3rem;border-top:1px solid var(--border);padding:2rem 0 0;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:center}
@media(max-width:768px){nav{padding:0 1rem}.wrap{padding:48px 1rem 72px}.cta-row{justify-content:stretch}.btn{width:100%;justify-content:center}}
</style>
</head>
<body>
<nav>
  <a href="project.html" class="nav-logo">VS.</a>
  <a href="project.html" class="nav-back">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Projects
  </a>
</nav>

<div class="wrap">
  <div class="hero-head">
    <h1 class="hero-title">Business Analysis</h1>
    <div class="coming-soon">
      <h2>More examples will appear here soon.</h2>
    </div>
  </div>

  <div class="cta-row">
    <a href="project.html" class="btn">Back to Projects</a>
  </div>

  <div class="footer-note">2026 Viviane Santos - Business Analyst</div>
</div>
</body>
</html>
