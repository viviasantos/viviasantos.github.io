    <text x="130" y="304" fill="#c77bff" font-family="DM Mono, monospace" font-size="34" letter-spacing="2">WHERE</text>
    <line x1="130" y1="344" x2="260" y2="344" stroke="#c77bff" stroke-opacity="0.35" stroke-width="3"/>
