<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Data Analysis cover">
  <defs>
    <linearGradient id="daBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090612"/>
      <stop offset="48%" stop-color="#14062a"/>
      <stop offset="100%" stop-color="#04040a"/>
    </linearGradient>
    <linearGradient id="daGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a2cff"/>
      <stop offset="45%" stop-color="#a51cff"/>
      <stop offset="100%" stop-color="#22b6ff"/>
    </linearGradient>
    <linearGradient id="daCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33d6ff"/>
      <stop offset="100%" stop-color="#4a7dff"/>
    </linearGradient>
    <filter id="blurSoft" x="-30%" y="-30%" width="160%" height="160%">
