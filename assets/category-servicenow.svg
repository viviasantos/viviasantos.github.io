<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="ServiceNow cover">
  <defs>
    <linearGradient id="snBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081018"/>
      <stop offset="55%" stop-color="#0b1630"/>
      <stop offset="100%" stop-color="#03050a"/>
    </linearGradient>
    <linearGradient id="snGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#37d7ff"/>
      <stop offset="50%" stop-color="#3f7bff"/>
      <stop offset="100%" stop-color="#d11eff"/>
    </linearGradient>
    <filter id="snBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="snSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#snBg)"/>
  <circle cx="430" cy="250" r="220" fill="#3a79ff" opacity="0.10" filter="url(#snBlur)"/>
  <circle cx="765" cy="335" r="180" fill="#d11eff" opacity="0.09" filter="url(#snBlur)"/>
  <circle cx="600" cy="540" r="240" fill="#37d7ff" opacity="0.07" filter="url(#snSoft)"/>

  <g transform="translate(95 120)">
    <rect x="0" y="0" width="180" height="230" rx="18" fill="#0f1320" stroke="url(#snGlow)" stroke-width="3"/>
    <text x="28" y="78" fill="#a7c4ff" font-family="DM Mono, monospace" font-size="28" letter-spacing="2">FLOW</text>
    <text x="28" y="126" fill="#a7c4ff" font-family="DM Mono, monospace" font-size="28" letter-spacing="2">RULES</text>
    <text x="28" y="174" fill="#a7c4ff" font-family="DM Mono, monospace" font-size="28" letter-spacing="2">API</text>
    <line x1="28" y1="195" x2="148" y2="195" stroke="#a7c4ff" stroke-opacity="0.35" stroke-width="3"/>
  </g>

  <g transform="translate(405 92)">
    <ellipse cx="205" cy="40" rx="125" ry="40" fill="#d11eff" opacity="0.20" filter="url(#snSoft)"/>
    <g>
      <ellipse cx="205" cy="52" rx="125" ry="40" fill="#8c17ce" stroke="url(#snGlow)" stroke-width="4"/>
      <path d="M80 52v68c0 22 56 40 125 40s125-18 125-40V52" fill="#430c75" stroke="url(#snGlow)" stroke-width="4"/>
      <ellipse cx="205" cy="120" rx="125" ry="40" fill="#3d096d" stroke="url(#snGlow)" stroke-width="4"/>
      <path d="M80 120v68c0 22 56 40 125 40s125-18 125-40v-68" fill="#32065c" stroke="url(#snGlow)" stroke-width="4"/>
      <ellipse cx="205" cy="188" rx="125" ry="40" fill="#2c054e" stroke="url(#snGlow)" stroke-width="4"/>
      <path d="M80 188v68c0 22 56 40 125 40s125-18 125-40v-68" fill="#240444" stroke="url(#snGlow)" stroke-width="4"/>
      <ellipse cx="205" cy="256" rx="125" ry="40" fill="#1d0339" stroke="url(#snGlow)" stroke-width="4"/>
    </g>
  </g>

  <g filter="url(#snSoft)" opacity="0.95">
    <path d="M370 500c130-120 275-140 410-98 98 30 182 91 285 171" fill="none" stroke="#2fd1ff" stroke-width="10" stroke-linecap="round"/>
    <path d="M430 560c103-86 214-107 340-76 88 21 157 59 248 129" fill="none" stroke="#d11eff" stroke-width="8" stroke-linecap="round"/>
  </g>

  <text x="600" y="610" text-anchor="middle" fill="#f7f7fb" font-family="Outfit, sans-serif" font-size="102" font-weight="500" letter-spacing="2">ServiceNow</text>
  <text x="600" y="660" text-anchor="middle" fill="#b7cffc" font-family="DM Mono, monospace" font-size="28" letter-spacing="7">WORKFLOW  AUTOMATION  API</text>
</svg>
