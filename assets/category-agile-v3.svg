<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Agile neon cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040612"/>
      <stop offset="50%" stop-color="#071738"/>
      <stop offset="100%" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25f0ff"/>
      <stop offset="100%" stop-color="#2c76ff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e92bff"/>
      <stop offset="100%" stop-color="#6d38ff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="220" cy="188" r="180" fill="#e92bff" opacity="0.08" filter="url(#soft)"/>
  <circle cx="610" cy="500" r="280" fill="#2c76ff" opacity="0.08" filter="url(#soft)"/>

  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M430 240c40-56 102-92 170-92 111 0 202 90 202 202 0 91-61 169-146 193" stroke="url(#cyan)" stroke-width="14"/>
    <path d="M672 542c-40 56-102 92-170 92-111 0-202-90-202-202 0-91 61-169 146-193" stroke="url(#pink)" stroke-width="14"/>
    <path d="M650 224l54-54" stroke="url(#cyan)" stroke-width="14"/>
    <path d="M704 170l18 48" stroke="url(#cyan)" stroke-width="14"/>
    <path d="M728 448l54 54" stroke="url(#pink)" stroke-width="14"/>
    <path d="M782 502l-18-48" stroke="url(#pink)" stroke-width="14"/>
  </g>

  <text x="600" y="612" text-anchor="middle" fill="#f7f7fb" font-family="Outfit, system-ui, sans-serif" font-size="104" font-weight="600" letter-spacing="2">Agile</text>
</svg>
