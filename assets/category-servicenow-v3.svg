<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="ServiceNow neon cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050913"/>
      <stop offset="50%" stop-color="#0a1531"/>
      <stop offset="100%" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25f0ff"/>
      <stop offset="100%" stop-color="#2f78ff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ee28ff"/>
      <stop offset="100%" stop-color="#6b3cff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="250" cy="182" r="170" fill="#25f0ff" opacity="0.08" filter="url(#soft)"/>
  <circle cx="960" cy="212" r="180" fill="#ee28ff" opacity="0.09" filter="url(#soft)"/>
  <circle cx="610" cy="506" r="280" fill="#2f78ff" opacity="0.08" filter="url(#soft)"/>

  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="394" y="168" width="412" height="248" rx="34" stroke="url(#cyan)" stroke-width="4"/>
    <path d="M446 220h180" stroke="#25f0ff" stroke-width="12"/>
    <path d="M446 268l52-52-52-52" stroke="#ee28ff" stroke-width="12"/>
    <path d="M618 168l-52 52 52 52" stroke="#ee28ff" stroke-width="12"/>
    <path d="M446 320h280" stroke="#bcefff" stroke-width="10"/>
    <path d="M446 360h200" stroke="#bcefff" stroke-width="10"/>
    <path d="M706 220h40" stroke="#ffbf2b" stroke-width="12"/>
    <path d="M726 200v40" stroke="#ffbf2b" stroke-width="12"/>
  </g>

  <text x="600" y="612" text-anchor="middle" fill="#f7f7fb" font-family="Outfit, system-ui, sans-serif" font-size="102" font-weight="600" letter-spacing="1.5">ServiceNow</text>
</svg>
